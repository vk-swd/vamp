  vps_front:
    build:
      dockerfile_inline: |
        FROM alpine:3.22.4
        RUN apk update; apk add iptables iproute2 tcpdump curl wget apache2-utils procps net-tools iputils-ping
    tty: true
    stdin_open: true
    container_name: vps_front
    cap_add:
      - NET_ADMIN
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo 1 > /proc/sys/net/ipv4/ip_forward
        iptables -t nat -A PREROUTING -i edgenic -j DNAT --to-destination 172.21.0.3
        iptables -t nat -A POSTROUTING -o vpsnic -j MASQUERADE
        tail -f /dev/null
    networks:
      edge:
        interface_name: edgenic
        ipv4_address: 172.20.0.2
      vps_net:
        interface_name: vpsnic
        ipv4_address: 172.21.0.2

  sigturn:
    image: alpine:3.22.4
    tty: true
    stdin_open: true
    container_name: sigturn
    networks:
      vps_net:
        ipv4_address: 172.21.0.3
  