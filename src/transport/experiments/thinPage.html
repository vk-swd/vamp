<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Thin Page1</title>
    <script id="s1" type="module"></script>
    <style id="st1"></style>
    <!-- <script type="module" src="./main.tsx"></script> -->
    <textarea id="addr" placeholder="address"></textarea>
    <textarea id="pass" placeholder="password"></textarea>
    <textarea id="usrnm" placeholder="username"></textarea>
    <textarea id="messageOut" placeholder="message to send"></textarea>
    <textarea id="messageRecieve" placeholder="message to receive"></textarea>
    <textarea id="log" placeholder="log" readonly="true"></textarea>
    <textarea id="fullUrls" placeholder="full turn url"></textarea>
    <button id="btn">Connect</button>
</head>

<body>
    <p id="status">Connecting...</p>
    <script>
        function logIce(hh, ...message) {
            console.log(hh, ...message);
            const logElem = document.getElementById('log');
            logElem.value += `[${hh}] ${message.join(' ')}\n`;
            logElem.scrollTop = logElem.scrollHeight; // auto-scroll to bottom
        }
        function fixSDP(sdp) {
            return sdp
                .split('\n')
                .map(line => line.replace(/\r$/, '')) // strip any stray \r just in case
                .join('\r\n') + '\r\n'; // rejoin with proper line endings + trailing
        }
        function render(parsed) {
            const script = document.createElement('script');
            script.type = 'module';
            script.textContent = parsed;
            document.head.appendChild(script);
            console.info('injected script');
        }
        let wrtcCon = null;
        const prepareConenction = (conParams) => {
            return new Promise((resolve, reject) => {
                pc1 = new RTCPeerConnection(conParams);
                const dataChannel = pc1.createDataChannel('ebn');
                logIce('iceLog1', 'ma2');
                pc1.onicecandidate = (e) => {
                    if (e.candidate) {
                        logIce('iceLog1', e.candidate.type + ' - ' + (e.candidate.address || 'hidden'));
                    } else {
                        // loadContent(createdSDP).then(loaded => {
                        //     const bytes = Uint8Array.from(atob(loaded), c => c.charCodeAt(0));
                        //     const text = new TextDecoder().decode(bytes); // ✅ proper UTF-8 decode
                        //     localStorage.setItem(storageLocation, loaded);
                        //     render(text);
                        // }).catch(err => {
                        //     document.getElementById('status').textContent = `Error: ${err}`;
                        // });
                        logIce('iceLog1', 'ICE gathering complete');
                        resolve([pc1, dataChannel]);
                    }
                };

                pc1.oniceconnectionstatechange = () => {
                    logIce('iceLog1', 'ICE state: ' + pc1.iceConnectionState);
                };

                pc1.onicegatheringstatechange = () => {
                    logIce('iceLog1', 'Gathering: ' + pc1.iceGatheringState);
                };
                pc1.onerror = (err) => {
                    reject(`PeerConnection error: ${err}`);
                }
                pc1.createOffer()
                .then(offer => pc1.setLocalDescription(offer))
            })
        }

        async function sendOfferGetAnswer(sdp, src, dst) {
            // Old artefact from page delivery tests
            // 1. Show cached version immediately (no blank flash)
            // const cached = localStorage.getItem(storageLocation);
            // if (cached != null && cached != undefined
            // //  && cached != "undefined"
            // ) {
            //     return cached
            // }
            return new Promise((resolve, reject) => {
                const requestId = `${Date.now()}-${Math.random()}`;
                // 2. Connect and get fresh content
                const ws = new WebSocket("wss://redacted");
                const res = (data) => {
                    resolve(data)
                    ws.close();
                }
                const rej = (err) => {
                    reject(err);
                    ws.close();
                }
                ws.onopen = () => {
                    logIce('log', `opened ws`)
                    // const msg = JSON.stringify({ kind: 'GetHtmlBundle', id: requestId, payload: null });
                    const msg = JSON.stringify({ src, dst, payload: sdp });
                    logIce('log', `sending message: ${msg}`)
                    ws.send(msg);
                };
                ws.onmessage = (e) => {
                    try {
                        const msg = JSON.parse(e.data)
                        logIce('log', `received message: ${e.data}`)
                        if (msg.src == dst) {
                            res(msg.payload);
                            return;
                        }
                        rej(new Error(e.data));
                    } catch (err) {
                        rej(`Failed to parse message: ${err}`);
                    }
                };
                ws.onerror = (err) => {
                    rej(`WebSocket error: ${err}`);
                }
                ws.onclose = () => {
                    rej(new Error('WebSocket closed'));
                };
            });
        }
        const setUpChannel = (channel) => {
            return new Promise((resolve, reject) => {
                channel.onopen = () => {
                    resolve();
                    logIce('log', 'Data channel opened');
                };
                channel.onmessage = (e) => {
                    logIce('log', 'Received message:', e.data);
                    document.getElementById('messageRecieve').value = e.data;
                };
                channel.onerror = (err) => {
                    reject(`Data channel error: ${err}`);
                };
            })
        }
        const establishConnection = (params) => {
            return prepareConenction(params)
            .then(([pc, dataChannel]) => {
                const createdSDP = fixSDP(pc.localDescription.sdp);
                return sendOfferGetAnswer(createdSDP, 'hello1', 'hello')
                .then(answer => {
                    logIce('iceLog1', 'got answer', answer);
                    return pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: answer }))
                })
                .then(() => {
                    logIce('iceLog1', 'remote description set successfully');
                    return setUpChannel(dataChannel);
                })
                .then(() => {

                    // const bytes = Uint8Array.from(atob(loaded), c => c.charCodeAt(0));
                    // const text = new TextDecoder().decode(bytes); // ✅ proper UTF-8 decode
                    // localStorage.setItem(storageLocation, loaded);
                    // render(text);
                    logIce('log', 'WebRTC connection established');
                    document.getElementById('status').textContent = 'Connected!';
                    return { pc, channel: dataChannel };
                })
            })
            .catch(err => {
                logIce('log', 'Failed to establish WebRTC connection:', err);
                document.getElementById('status').textContent = `Connection error: ${err}`;
            });
        }
        const getTurnUrl = () => {
            const conParams = {
                iceServers: []
            }
            const fullUrl = document.getElementById('fullUrls').value || '';
            if (fullUrl) {
                const match = fullUrl.match(/^turns:(.+?):(.+?)@(.+?):(\d+)$/);
                if (!match) {
                    throw new Error("Invalid TURN string format");
                }
                const [, username, password, addr, port] = match;
                logIce('log', 'Using full TURN URL:', fullUrl, "conParams: ", conParams);
                conParams.iceServers.push({ urls: `turns:${addr}:${port}`, username, credential: password });
            } else { 
                const address = document.getElementById('addr').value || '';
                const username = document.getElementById('usrnm').value || '';
                const password = document.getElementById('pass').value || '';
                conParams.iceServers.push({ urls: `turns:` + address, username: username, credential: password });
            }
            return conParams;
        }
        const getWrtcCon = () => {
            if (wrtcCon != null) {
                return wrtcCon;
            }
            wrtcCon = new Promise((resolveG, rejectG) => {
                logIce('log', 'starting script');
                window.__TRANSPORT__ = 'ws'
                // const storageLocation = 'loaded_page'; // or 'cache' for Cache API / IndexedDB
                let conParams;
                try {
                    conParams = getTurnUrl();
                } catch (err) {
                    rejectG(`Invalid TURN server configuration: ${err}`);
                    return;
                }
                logIce('iceLog1', 'conParams', conParams);
                establishConnection(conParams)
                .then(resolveG)
                .catch(err => {
                    document.getElementById('status').textContent = `Error: ${err}`;
                    rejectG(err);
                });
            });
            return wrtcCon;
        }
        document.getElementById('btn').addEventListener('click', () => {
            getWrtcCon().then(({pc, channel}) => {
                logIce('log', 'WebRTC connection established');
                document.getElementById('status').textContent = 'Connected!';
                const messageToSend = document.getElementById('messageOut').value;
                if (!messageToSend) {
                    logIce('log', 'No message to send');
                    return;
                }
                channel.send(messageToSend);
                logIce('log', 'Sent message:', messageToSend);
            }).catch(err => {
                logIce('log', 'Failed to establish WebRTC connection:', err);
                document.getElementById('status').textContent = `Connection error: ${err}`;
            });
        });
    </script>
    <div id="superRoot"></div>
    <div id="root"></div>
</body>

</html>
